name: Update Feather repo

# Fires whenever a non-prerelease GitHub Release is published.
# Downloads the IPA size from the release assets, patches apps.json,
# and commits it back to main so Feather sees the new version.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update apps.json for (e.g. ios-v2.1.0)"
        required: true
        type: string

jobs:
  update:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release metadata
        id: meta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
            # Pull metadata for the manually-specified tag
            META=$(gh release view "$TAG" --repo "${{ github.repository }}" --json tagName,publishedAt,body,assets)
            echo "tag=$TAG"                                            >> "$GITHUB_OUTPUT"
            {
              echo "published_at<<EOF"
              echo "$META" | python3 -c "import json,sys; print(json.load(sys.stdin)['publishedAt'])"
              echo "EOF"
              echo "body<<EOF"
              echo "$META" | python3 -c "import json,sys; print(json.load(sys.stdin).get('body',''))"
              echo "EOF"
              echo "assets<<EOF"
              echo "$META" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['assets']))"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=${{ github.event.release.tag_name }}"
              echo "published_at=${{ github.event.release.published_at }}"
              echo "body<<EOF"
              echo "${{ github.event.release.body }}"
              echo "EOF"
              echo "assets<<EOF"
              echo '${{ toJson(github.event.release.assets) }}'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Patch apps.json
        env:
          TAG_NAME:     ${{ steps.meta.outputs.tag }}
          PUBLISHED_AT: ${{ steps.meta.outputs.published_at }}
          RELEASE_BODY: ${{ steps.meta.outputs.body }}
          ASSETS_JSON:  ${{ steps.meta.outputs.assets }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re

          tag = os.environ['TAG_NAME']

          # Strip both 'ios-v' and plain 'v' prefixes so the version field stays clean
          m = re.match(r'^(?:ios-)?v(.+)$', tag)
          version = m.group(1) if m else tag

          date    = os.environ['PUBLISHED_AT']
          body    = os.environ.get('RELEASE_BODY', '')
          raw     = os.environ.get('ASSETS_JSON', '[]').strip() or '[]'
          assets  = json.loads(raw)

          # gh CLI assets have keys: name, size, url (api), apiUrl, etc.
          # release-event assets have: name, size, browser_download_url
          def asset_url(a):
              return a.get('browser_download_url') \
                  or f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/releases/download/{tag}/{a['name']}"

          ipa = next((a for a in assets if a['name'].endswith('.ipa')), None)
          if not ipa:
              print("No IPA found in release assets. Skipping repository update.")
              exit(0)

          url  = asset_url(ipa)
          size = ipa['size']

          with open('apps.json') as f:
              data = json.load(f)

          app = data['apps'][0]

          new_ver = {
              "version": version,
              "buildVersion": version,
              "date": date,
              "localizedDescription": body,
              "downloadURL": url,
              "size": size
          }

          # Remove existing entries for this version, and any bogus 'latest' pseudo-version
          app['versions'] = [v for v in app['versions']
                             if v['version'] != version and v['version'] != 'latest']

          # Newest version first
          app['versions'].insert(0, new_ver)

          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(f"apps.json patched for {version}")
          PYEOF

      - name: Commit and push
        run: |
          # If update skipped (no changes to apps.json), git diff --cached --quiet will exit successfully.
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Update Feather repo for ${{ github.event.release.tag_name }} [skip ci]"
          git push
