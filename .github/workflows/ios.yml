name: Build iOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15        # Xcode 16, required for iOS 26 target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="/Applications/Xcode.app"
          fi
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/ATSMini.xcodeproj \
            -scheme ATSMini \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*/Intermediates*" \
            -not -path "*-Runner.app*" \
            -maxdepth 8 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app not found. Listing derived data:"
            find "$RUNNER_TEMP/DerivedData" -maxdepth 6 2>/dev/null || echo "(DerivedData missing entirely)"
            exit 1
          fi
          echo "✅ Found app at: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ATSMini.ipa Payload/
          echo "IPA size: $(du -sh ATSMini.ipa | cut -f1)"

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"             >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF#refs/tags/}"   >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest"         >> "$GITHUB_OUTPUT"
            echo "prerelease=true"    >> "$GITHUB_OUTPUT"
            echo "title=Latest build" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          TITLE="${{ steps.tag.outputs.title }}"
          
          if [ "$TAG_NAME" = "latest" ]; then
            # Only upload if the 'latest' release already exists (created by the firmware workflow)
            if gh release view latest --repo "${{ github.repository }}" &>/dev/null; then
              gh release upload latest ATSMini.ipa --clobber --repo "${{ github.repository }}"
            else
              echo "No 'latest' release found — skipping upload. IPA is available as a build artifact."
            fi
          else
            # For version tags, create the release if it doesn't exist, and upload
            gh release create "$TAG_NAME" \
              --title "$TITLE" \
              --notes "Unsigned IPA — sideload with AltStore. Built from \`$SHORT_SHA\` on $(date -u +'%Y-%m-%d %H:%M UTC')" \
              || true
            gh release upload "$TAG_NAME" ATSMini.ipa --clobber
          fi
