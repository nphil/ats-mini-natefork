name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-15

    env:
      SCHEME:  ATSMini
      PROJECT: ATSMini.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from project.yml
        id: ver
        run: |
          VERSION=$(grep -E '^\s+MARKETING_VERSION:' ios/project.yml \
            | head -1 | awk '{print $2}' | tr -d '"')
          TAG="ios-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "${TAG} already exists — nothing to release."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.check.outputs.already != 'true'
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        if: steps.check.outputs.already != 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check.outputs.already != 'true'
        run: cd ios && xcodegen generate --spec project.yml

      - name: Archive (unsigned)
        if: steps.check.outputs.already != 'true'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project      "ios/${{ env.PROJECT }}" \
            -scheme       "${{ env.SCHEME }}" \
            -configuration Release \
            -destination  "generic/platform=iOS" \
            -archivePath  "$RUNNER_TEMP/ATSMini.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO \
            INSTALL_PATH="/Applications" \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Package IPA
        if: steps.check.outputs.already != 'true'
        run: |
          APP=$(find "$RUNNER_TEMP/ATSMini.xcarchive" \
            -name "*.app" ! -name "*.xctest" ! -path "*/SwiftSupport/*" \
            2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app not found in archive:"
            find "$RUNNER_TEMP/ATSMini.xcarchive" -maxdepth 6 2>/dev/null || echo "(archive missing)"
            exit 1
          fi
          echo "✅ Found: $APP"
          mkdir -p Payload && cp -r "$APP" Payload/
          zip -r ATSMini.ipa Payload/
          echo "IPA: $(du -sh ATSMini.ipa | cut -f1)"

      - name: Update apps.json, tag, and publish release
        if: steps.check.outputs.already != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          PUBLISHED_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_SIZE=$(wc -c < ATSMini.ipa | tr -d ' ')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/ATSMini.ipa"

          # Build release notes file — avoids multi-line bash strings at col 0 in YAML
          NOTES_FILE="ios/RELEASE_NOTES.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-notes.md
          else
            echo "Unsigned IPA — sideload with AltStore / SideStore / Feather." > release-notes.md
          fi
          printf '\n\nBuilt from `%s` on %s\n' "${SHORT_SHA}" "$(date -u +'%Y-%m-%d %H:%M UTC')" \
            >> release-notes.md

          # Patch apps.json (reads notes from file instead of env var)
          VERSION="$VERSION" PUBLISHED_DATE="$PUBLISHED_DATE" \
          DOWNLOAD_URL="$DOWNLOAD_URL" IPA_SIZE="$IPA_SIZE" \
          python3 - <<'PYEOF'
          import json, os
          version = os.environ['VERSION']
          date    = os.environ['PUBLISHED_DATE']
          url     = os.environ['DOWNLOAD_URL']
          size    = int(os.environ['IPA_SIZE'])
          body    = open('release-notes.md').read()

          with open('apps.json') as f:
              data = json.load(f)
          app = data['apps'][0]
          app['versions'] = [v for v in app['versions']
                             if v['version'] != version and v['version'] != 'latest']
          app['versions'].insert(0, {
              'version': version, 'buildVersion': version,
              'date': date, 'localizedDescription': body,
              'downloadURL': url, 'size': size,
          })
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'apps.json patched for {version}')
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          if ! git diff --cached --quiet; then
            git commit -m "Update Feather repo for ${TAG} [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            ATSMini.ipa \
            --title "ATS-Mini Remote ${VERSION}" \
            --notes-file release-notes.md
