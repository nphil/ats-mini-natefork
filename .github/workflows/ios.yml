name: Build iOS App

on:
  push:
    branches: [main]
    tags: ['v*', 'ios-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15        # Xcode 16, required for iOS 26 target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST=$(find /Applications -maxdepth 1 -type d -name 'Xcode_*.app' 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="/Applications/Xcode.app"
          fi
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/ATSMini.xcodeproj \
            -scheme ATSMini \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*/Intermediates*" \
            -not -path "*-Runner.app*" \
            -maxdepth 8 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app not found. Listing derived data:"
            find "$RUNNER_TEMP/DerivedData" -maxdepth 6 2>/dev/null || echo "(DerivedData missing entirely)"
            exit 1
          fi
          echo "✅ Found app at: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ATSMini.ipa Payload/
          echo "IPA size: $(du -sh ATSMini.ipa | cut -f1)"

      - name: Determine release tag
        id: tag
        run: |
          REF="$GITHUB_REF"
          if [[ "$REF" == refs/tags/ios-v* ]]; then
            VER="${REF#refs/tags/ios-v}"
            {
              echo "tag=ios-v${VER}"
              echo "prerelease=false"
              echo "title=ATS-Mini Remote ${VER}"
              echo "kind=ios"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == refs/tags/v* ]]; then
            VER="${REF#refs/tags/}"
            {
              echo "tag=${VER}"
              echo "prerelease=false"
              echo "title=${VER}"
              echo "kind=firmware"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=latest"
              echo "prerelease=true"
              echo "title=Latest build"
              echo "kind=rolling"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          TITLE="${{ steps.tag.outputs.title }}"
          KIND="${{ steps.tag.outputs.kind }}"
          REPO="${{ github.repository }}"
          BUILD_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"

          if [ "$KIND" = "rolling" ]; then
            # Only attach to 'latest' if it already exists (created by firmware workflow)
            if gh release view latest --repo "$REPO" &>/dev/null; then
              gh release upload latest ATSMini.ipa --clobber --repo "$REPO"
            else
              echo "No 'latest' release found — skipping upload. IPA is available as a build artifact."
            fi
          elif [ "$KIND" = "ios" ]; then
            # iOS-only versioned release — create new
            NOTES=$(printf 'Unsigned IPA — sideload with AltStore / SideStore.\n\nBuilt from `%s` on %s\n' "$SHORT_SHA" "$BUILD_DATE")
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes "$NOTES" || true
            gh release upload "$TAG_NAME" ATSMini.ipa --clobber --repo "$REPO"
          else
            # Firmware version tag — attach IPA to the existing firmware release
            NOTES=$(printf 'Built from `%s` on %s\n' "$SHORT_SHA" "$BUILD_DATE")
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes "$NOTES" || true
            gh release upload "$TAG_NAME" ATSMini.ipa --clobber --repo "$REPO"
          fi
