name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-15

    env:
      SCHEME:  ATSMini
      PROJECT: ATSMini.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          VERSION=$(grep -E '^\s+MARKETING_VERSION:' ios/project.yml \
            | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep -E '^\s+CURRENT_PROJECT_VERSION:' ios/project.yml \
            | head -1 | awk '{print $2}' | tr -d '"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_BUILD="$((BUILD + 1))"
          {
            echo "version=${NEW_VER}"
            echo "build=${NEW_BUILD}"
            echo "tag=ios-v${NEW_VER}"
          } >> "$GITHUB_OUTPUT"

      - name: Update version in project.yml
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          NEW_BUILD:   ${{ steps.ver.outputs.build }}
        run: |
          python3 - <<'PYEOF'
          import os, re
          ver   = os.environ['NEW_VERSION']
          build = os.environ['NEW_BUILD']
          with open('ios/project.yml') as f:
              text = f.read()
          text = re.sub(r'MARKETING_VERSION: "[^"]*"',
                        f'MARKETING_VERSION: "{ver}"', text)
          text = re.sub(r'CURRENT_PROJECT_VERSION: "[^"]*"',
                        f'CURRENT_PROJECT_VERSION: "{build}"', text)
          with open('ios/project.yml', 'w') as f:
              f.write(text)
          print(f'Bumped to {ver} (build {build})')
          PYEOF

      - name: Select Xcode
        run: |
          LATEST=$(find /Applications -maxdepth 1 -type d -name 'Xcode_*.app' 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="/Applications/Xcode.app"
          fi
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate --spec project.yml

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/${{ env.PROJECT }} \
            -scheme  "${{ env.SCHEME }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*/Intermediates*" \
            -not -path "*-Runner.app*" \
            -maxdepth 8 | head -1)
          if [ -z "$APP" ]; then
            echo "❌ .app not found. Listing derived data:"
            find "$RUNNER_TEMP/DerivedData" -maxdepth 6 2>/dev/null || echo "(DerivedData missing entirely)"
            exit 1
          fi
          echo "✅ Found app at: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ATSMini.ipa Payload/
          echo "IPA size: $(du -sh ATSMini.ipa | cut -f1)"

      - name: Commit version bump, update apps.json, tag, and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          PUBLISHED_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_SIZE=$(wc -c < ATSMini.ipa | tr -d ' ')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/ATSMini.ipa"

          NOTES_FILE="ios/RELEASE_NOTES.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-notes.md
          else
            echo "Unsigned IPA — sideload with AltStore / SideStore / Feather." > release-notes.md
          fi
          printf "\n\nBuilt from \`%s\` on %s\n" \
            "${SHORT_SHA}" "$(date -u +'%Y-%m-%d %H:%M UTC')" >> release-notes.md

          VERSION="$VERSION" PUBLISHED_DATE="$PUBLISHED_DATE" \
          DOWNLOAD_URL="$DOWNLOAD_URL" IPA_SIZE="$IPA_SIZE" \
          python3 - <<'PYEOF'
          import json, os
          version = os.environ['VERSION']
          date    = os.environ['PUBLISHED_DATE']
          url     = os.environ['DOWNLOAD_URL']
          size    = int(os.environ['IPA_SIZE'])
          body    = open('release-notes.md').read()

          with open('apps.json') as f:
              data = json.load(f)
          app = data['apps'][0]
          app['versions'] = [v for v in app['versions']
                             if v['version'] != version and v['version'] != 'latest']
          app['versions'].insert(0, {
              'version': version, 'buildVersion': version,
              'date': date, 'localizedDescription': body,
              'downloadURL': url, 'size': size,
          })
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'apps.json patched for {version}')
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/project.yml apps.json
          git commit -m "chore: bump iOS to ${VERSION} [skip ci]"
          git restore .   # discard xcodegen-regenerated xcodeproj changes before rebase
          git fetch origin main
          git rebase --autostash origin/main
          git push origin main

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            ATSMini.ipa \
            --prerelease \
            --title "ATS-Mini Remote ${VERSION}" \
            --notes-file release-notes.md

          # Also attach IPA to the latest versioned firmware release so it
          # shows up alongside the firmware binary in one download.
          FW_RELEASE=$(gh api "repos/${{ github.repository }}/releases?per_page=20" \
            --jq '[.[] | select(.prerelease == false) | select(.tag_name | test("^v[0-9]"))] | first | .tag_name' \
            2>/dev/null || true)
          if [ -n "$FW_RELEASE" ] && [ "$FW_RELEASE" != "null" ]; then
            gh release upload "$FW_RELEASE" ATSMini.ipa \
              --repo "${{ github.repository }}" --clobber
            echo "IPA also attached to firmware release $FW_RELEASE"
          fi
