name: Build Android App

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and release APK
    runs-on: ubuntu-latest
    concurrency:
      group: android-release
      cancel-in-progress: false
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - name: Compute next version
        id: ver
        run: |
          NAME=$(grep -E 'versionName = ' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          CODE=$(grep -E 'versionCode = ' app/build.gradle.kts | head -1 | sed -E 's/[^0-9]//g')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NAME"
          NEW_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_CODE="$((CODE + 1))"
          {
            echo "name=${NEW_NAME}"
            echo "code=${NEW_CODE}"
            echo "tag=android-v${NEW_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        env:
          NEW_NAME: ${{ steps.ver.outputs.name }}
          NEW_CODE: ${{ steps.ver.outputs.code }}
        run: |
          sed -i -E "s/versionName = \"[^\"]+\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts
          sed -i -E "s/versionCode = [0-9]+/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          echo "Bumped to ${NEW_NAME} (code ${NEW_CODE})"

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        id: apk
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          OUT="ats-mini-${TAG}.apk"
          cp "$SRC" "../${OUT}"
          echo "path=${OUT}" >> "$GITHUB_OUTPUT"
          echo "Built ${OUT} ($(du -h ../${OUT} | cut -f1))"

      - name: Write release notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then cp RELEASE_NOTES.md ../release-notes.md; else
            echo "ATS-Mini Remote for Android — sideload via Obtainium." > ../release-notes.md
          fi
          printf "\n\nBuilt from \`%s\` on %s\n" \
            "$(git rev-parse --short HEAD)" "$(date -u +'%Y-%m-%d %H:%M UTC')" >> ../release-notes.md

      - name: Commit version bump, tag, and publish
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          NEW_NAME: ${{ steps.ver.outputs.name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle.kts
          git commit -m "chore: bump Android to ${NEW_NAME} [skip ci]"
          git fetch origin main
          git rebase --autostash origin/main
          git push origin main

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            "${{ steps.apk.outputs.path }}" \
            --title "ATS-Mini Android ${NEW_NAME}" \
            --notes-file release-notes.md
