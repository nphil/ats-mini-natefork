name: Build Firmware

on:
  push:
    branches:
      - '**'   # every branch push produces a downloadable artifact
    paths:
      - 'ats-mini/**'
      - 'changelog/**'
      - 'CHANGELOG.md'
      - '.github/workflows/build.yml'
      - '.pre-commit-config.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'ats-mini/**'
      - 'changelog/**'
      - 'CHANGELOG.md'
      - '.github/workflows/build.yml'
      - '.pre-commit-config.yaml'
  workflow_dispatch:
    inputs:
      revision:
        description: "A tag to release, e.g. v1.00"
        type: string
        required: false

jobs:
  build:
    name: build ${{ matrix.board.profile }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        board:
          - profile: esp32s3-ospi
            # If you change this line, change it in sketch.yaml as well
            fqbn: esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=8M,PSRAM=opi,CPUFreq=80,USBMode=hwcdc,FlashMode=qio,PartitionScheme=custom,DebugLevel=none
            artifact-suffix: ospi
          - profile: esp32s3-qspi
            # If you change this line, change it in sketch.yaml as well
            fqbn: esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=8M,PSRAM=enabled,CPUFreq=80,USBMode=hwcdc,FlashMode=qio,PartitionScheme=custom,DebugLevel=none
            artifact-suffix: qspi

    outputs:
      slug: ${{ steps.slug.outputs.slug }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: "${{ github.event.inputs.revision || github.ref }}"

      - name: Get version slug
        id: slug
        run: |
          echo "slug=$(git describe --tags --match 'v?.??' --always --dirty || echo v0.00)" >> "$GITHUB_OUTPUT"

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core with retries
        run: |
          # Pre-fetch the ESP32 core before compile-sketches runs.
          # Espressif's CDN returns intermittent 502s on some chip-variant
          # lib packages (esp32p4, esp32h2, etc.); retrying fixes it.
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          for attempt in 1 2 3; do
            arduino-cli core install esp32:esp32@3.3.7 && break
            echo "Attempt $attempt failed – waiting 30s before retry..."
            sleep 30
          done

      - name: Compile firmware
        uses: arduino/compile-sketches@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sketch-paths: |
            - ats-mini
          fqbn: ${{ matrix.board.fqbn }}
          cli-compile-flags: |
            - --profile
            - ${{ matrix.board.profile }}
            - --export-binaries
          # Disabled to prevent building artifact for a previous commit
          enable-deltas-report: false
          enable-warnings-report: true

      - name: Save sketches report artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          path: sketches-reports
          name: sketches-report-${{ matrix.board.artifact-suffix }}

      - name: Prepare compiled artifact
        run: |
          mkdir -p artifact/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}
          mv ats-mini/build/esp32.esp32.esp32s3/*.ino.bin ats-mini/build/esp32.esp32.esp32s3/*.ino.*.bin artifact/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}/
          cp CHANGELOG.md artifact/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}/

      - name: Merge all partitions into a single flashable binary
        run: |
          ARTIFACT=artifact/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}

          # Install esptool from PyPI so we have a known, callable version
          # rather than trying to locate arduino-cli's internal copy at a
          # path that varies across runner environments.
          pip install esptool --quiet

          # boot_app0.bin is part of the ESP32 Arduino core and marks
          # partition 0 as the OTA boot target (required for a clean first flash).
          BOOT_APP0=$(find ~/.arduino15 -name "boot_app0.bin" | head -1)

          python3 -m esptool \
            --chip esp32s3 merge_bin \
            --output "$ARTIFACT/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}-flash.bin" \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 8MB \
            0x0    "$ARTIFACT"/*.ino.bootloader.bin \
            0x8000 "$ARTIFACT"/*.ino.partitions.bin \
            0xe000 "$BOOT_APP0" \
            0x10000 "$ARTIFACT"/*.ino.bin

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ github.event.repository.name }}-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}
          path: artifact

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
    steps:
      - name: Download the build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ats-mini-*'
          merge-multiple: true
          path: artifact
      - name: Archive the build artifacts
        run: cd "artifact" && find . -mindepth 1 -maxdepth 1 -type d -exec sh -c 'zip -r "../${1%/}.zip" "$1"' _ {} \;
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLUG: ${{ needs.build.outputs.slug }}
        run: >-
          python -c 'import os,re; t=open(f"""artifact/ats-mini-{os.environ["SLUG"]}-ospi/CHANGELOG.md""").read(); r=re.search(f"""(^## {os.environ["SLUG"][1:].replace(".", "\\.") } .*?)(?=^## \\d|\\Z)""", t, re.MULTILINE | re.DOTALL); print(r.group(0) if r else "")' |
          gh release create "$SLUG" --repo '${{ github.repository }}' --notes-file -
      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FILENAMES: ${{ github.event.repository.name }}-${{ needs.build.outputs.slug }}-*.zip
          SLUG: ${{ needs.build.outputs.slug }}
        run: |
          # shellcheck disable=SC2086
          gh release upload "$SLUG" $FILENAMES --repo '${{ github.repository }}' --clobber

  latest-release:
    # Overwrites the rolling "latest" release on every push to main so the
    # Releases page always has a ready-to-flash binary without tagging.
    # continue-on-error: tag protection rules may block creating the 'latest'
    # tag on some repo configurations; versioned releases are the real deliverable.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ats-mini-*'
          merge-multiple: true
          path: artifact

      - name: Package artifacts and collect flash binaries
        run: |
          # Create per-variant zip archives (same format as versioned releases)
          cd artifact
          find . -mindepth 1 -maxdepth 1 -type d -exec sh -c \
            'zip -r "../${1#./}.zip" "$1"' _ {} \;
          cd ..
          # Copy merged flash binaries to the top level for direct one-click download
          find artifact -name '*-flash.bin' -exec cp {} . \;

      - name: Write release notes
        run: |
          SLUG="${{ needs.build.outputs.slug }}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          # Extract the latest section from CHANGELOG.md (between first two ## headings)
          CHANGELOG_SECTION="$(python3 -c "
import re, sys
try:
    t = open('CHANGELOG.md').read()
    m = re.search(r'(^## .+?)(?=^## |\Z)', t, re.MULTILINE | re.DOTALL)
    print(m.group(0).strip() if m else '')
except Exception as e:
    print('')
")"

          # Recent commits since last tag (capped at 20)
          LAST_TAG="$(git describe --tags --match 'v?.??' --abbrev=0 2>/dev/null || true)"
          if [ -n "$LAST_TAG" ]; then
            COMMITS="$(git log --oneline "${LAST_TAG}..HEAD" --no-merges | head -20)"
          else
            COMMITS="$(git log --oneline -20 --no-merges)"
          fi

          cat > release-notes.md << EOF
          > **Auto-updated on every push to \`main\`.**
          > Built from commit \`${SHORT_SHA}\` — ${BUILD_DATE}

          ## ⬇️ Quick Download (ospi — most ATS-Mini units)

          Download \`ats-mini-${SLUG}-ospi-flash.bin\` and flash with:

          \`\`\`
          esptool.py --chip esp32s3 write_flash 0x0 ats-mini-${SLUG}-ospi-flash.bin
          \`\`\`

          ## Variants

          | File | Board PSRAM |
          |------|-------------|
          | \`*-ospi-flash.bin\` | Octal SPI — most common ATS-Mini |
          | \`*-qspi-flash.bin\` | Quad SPI |

          The \`.zip\` files contain individual partition images for OTA / partial updates.

          ## What's changed
          EOF

          if [ -n "$CHANGELOG_SECTION" ]; then
            echo "$CHANGELOG_SECTION" >> release-notes.md
          elif [ -n "$COMMITS" ]; then
            { echo ""; echo '```'; echo "$COMMITS"; echo '```'; } >> release-notes.md
          else
            echo "_No changelog available._" >> release-notes.md
          fi

      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REPO='${{ github.repository }}'
          TITLE="Latest Build (${{ needs.build.outputs.slug }})"

          # Check if 'latest' release already exists.
          # gh api outputs the raw JSON body to stdout even on 4xx errors, so
          # using --jq '.id' on a 404 response sets RELEASE_ID to the full JSON
          # blob rather than empty string.  Guard by only extracting .id when
          # the API call actually succeeds (exit 0).
          RELEASE_ID=""
          if RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/latest" 2>/dev/null); then
            RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          fi

          if [ -n "$RELEASE_ID" ]; then
            # Delete old assets (filenames change with each slug so they accumulate)
            gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --jq '.[].id' \
              | xargs -r -I{} gh api -X DELETE "repos/${REPO}/releases/assets/{}"

            # Patch metadata in-place — no tag delete/recreate, bypasses ruleset restrictions
            gh api -X PATCH "repos/${REPO}/releases/${RELEASE_ID}" \
              -f name="${TITLE}" \
              -f body="$(cat release-notes.md)" \
              -F prerelease=true \
              --silent
          else
            # First run: create the release (also creates the 'latest' tag)
            gh release create latest \
              --repo "${REPO}" \
              --prerelease \
              --title "${TITLE}" \
              --notes-file release-notes.md
          fi

          # Upload new assets (--clobber handles any same-name leftovers)
          gh release upload latest --repo "${REPO}" --clobber ./*.zip ./*-flash.bin

  firmware-auto-release:
    # Auto-creates a versioned firmware release on main when VER_APP in
    # Common.h has no matching vX.YY release yet — mirrors how ios.yml
    # auto-releases ios-vX.Y.Z on a new MARKETING_VERSION.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read firmware version from Common.h
        id: fw
        run: |
          RAW=$(grep -oP '#define VER_APP\s+\K\d+' ats-mini/Common.h)
          MAJOR="${RAW:0:1}"
          MINOR="${RAW:1}"
          VERSION="${MAJOR}.${MINOR}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "Firmware version: ${VERSION} (tag: ${TAG})"

      - name: Check whether release already exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.fw.outputs.tag }}
        run: |
          if gh release view "${TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "${TAG} already released — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No release for ${TAG} yet — will create one."
          fi

      - name: Download build artifacts
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: 'ats-mini-*'
          merge-multiple: true
          path: artifact

      - name: Package artifacts with clean version names
        if: steps.check.outputs.skip == 'false'
        env:
          TAG: ${{ steps.fw.outputs.tag }}
        run: |
          mkdir -p release
          # Zip each variant dir, renaming to ats-mini-vX.YY-<variant>.zip
          for dir in artifact/*/; do
            dir="${dir%/}"
            VARIANT=$(basename "$dir" | rev | cut -d'-' -f1 | rev)   # ospi or qspi
            zip -r "release/ats-mini-${TAG}-${VARIANT}.zip" "$dir"
          done
          # Rename and copy flash binaries
          find artifact -name '*-flash.bin' | while read -r f; do
            VARIANT=$(basename "$f" | rev | cut -d'-' -f1,2 | rev)   # ospi-flash.bin / qspi-flash.bin
            cp "$f" "release/ats-mini-${TAG}-${VARIANT}"
          done

      - name: Extract changelog section
        if: steps.check.outputs.skip == 'false'
        id: notes
        env:
          VERSION: ${{ steps.fw.outputs.version }}
        run: |
          NOTES=$(python3 - << 'PYEOF'
          import os, re
          ver = os.environ['VERSION'].replace('.', r'\.')
          t = open('CHANGELOG.md').read()
          m = re.search(r'(^## ' + ver + r' .*?)(?=^## |\Z)', t, re.MULTILINE | re.DOTALL)
          print(m.group(0).strip() if m else 'Firmware release.')
          PYEOF
          )
          # Write to file to avoid quoting issues
          echo "$NOTES" > fw-release-notes.md

      - name: Create versioned firmware release
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.fw.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${TAG}" \
            --notes-file fw-release-notes.md \
            release/*.zip release/*-flash.bin
