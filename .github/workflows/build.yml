name: Build Firmware

on:
  push:
    branches:
      - '**'   # every branch push produces a downloadable artifact
    paths:
      - 'ats-mini/**'
      - 'ats-mini-recovery/**'
      - 'changelog/**'
      - 'CHANGELOG.md'
      - '.github/workflows/build.yml'
      - '.pre-commit-config.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'ats-mini/**'
      - 'ats-mini-recovery/**'
      - 'changelog/**'
      - 'CHANGELOG.md'
      - '.github/workflows/build.yml'
      - '.pre-commit-config.yaml'
  workflow_dispatch:
    inputs:
      revision:
        description: "A tag to release, e.g. v1.00"
        type: string
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build ${{ matrix.board.profile }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        board:
          - profile: esp32s3-ospi
            # If you change this line, change it in sketch.yaml as well.
            # FlashMode=dio is REQUIRED on octal-PSRAM (PSRAM=opi) boards — QIO
            # shares pins with the OPI PSRAM and hangs the ROM at ets_loader.c 78.
            fqbn: esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=8M,PSRAM=opi,CPUFreq=80,USBMode=hwcdc,FlashMode=dio,PartitionScheme=custom,DebugLevel=none
            artifact-suffix: ospi

    outputs:
      slug: ${{ steps.slug.outputs.slug }}
      fw_version: ${{ steps.bump.outputs.version }}
      fw_tag: ${{ steps.bump.outputs.tag }}
      fw_raw: ${{ steps.bump.outputs.new_raw }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: "${{ github.event.inputs.revision || github.ref }}"

      - name: Auto-bump VER_APP (push to main only)
        id: bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          RAW=$(grep -oP '#define VER_APP\s+\K\d+' ats-mini/Common.h)
          NEW=$((RAW + 1))
          MAJOR="${NEW:0:1}"
          MINOR="${NEW:1}"
          VERSION="${MAJOR}.${MINOR}"
          TAG="v${VERSION}"
          # Update Common.h in-place (committed later by firmware-auto-release)
          sed -i "s/#define VER_APP        ${RAW}/#define VER_APP        ${NEW}/" ats-mini/Common.h
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "new_raw=${NEW}"
            echo "old_raw=${RAW}"
          } >> "$GITHUB_OUTPUT"
          echo "Auto-bumped VER_APP: ${RAW} -> ${NEW} (tag ${TAG})"

      - name: Get version slug
        id: slug
        run: |
          echo "slug=$(git describe --tags --match 'v?.??' --always --dirty || echo v0.00)" >> "$GITHUB_OUTPUT"

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino core and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-esp32-3.3.10-${{ hashFiles('ats-mini/sketch.yaml') }}
          restore-keys: |
            arduino-esp32-3.3.10-

      - name: Install ESP32 core with retries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index || true  # tolerate transient CDN failures on non-ESP32 indexes
          # Skip install if already cached
          if ! arduino-cli core list | grep -q 'esp32:esp32.*3.3.10'; then
            for attempt in 1 2 3; do
              arduino-cli core install esp32:esp32@3.3.10 && break
              echo "Attempt $attempt failed – waiting 30s before retry..."
              sleep 30
            done
          fi

      - name: Compile recovery firmware
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.board.fqbn }}" \
            --output-dir ats-mini-recovery/build \
            ats-mini-recovery/
          echo "Recovery binary:"
          ls ats-mini-recovery/build/

      - name: Compile firmware
        uses: arduino/compile-sketches@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sketch-paths: |
            - ats-mini
          fqbn: ${{ matrix.board.fqbn }}
          cli-compile-flags: |
            - --profile
            - ${{ matrix.board.profile }}
            - --export-binaries
          # Disabled to prevent building artifact for a previous commit
          enable-deltas-report: false
          enable-warnings-report: true

      - name: Save sketches report artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          path: sketches-reports
          name: sketches-report-${{ matrix.board.artifact-suffix }}

      - name: Prepare compiled artifact
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          SUFFIX="${{ matrix.board.artifact-suffix }}"
          ARTIFACT_DIR="artifact/ats-mini-${SLUG}-${SUFFIX}"
          mkdir -p "${ARTIFACT_DIR}"
          mv ats-mini/build/esp32.esp32.esp32s3/*.ino.bin \
             ats-mini/build/esp32.esp32.esp32s3/*.ino.*.bin \
             "${ARTIFACT_DIR}/"
          cp CHANGELOG.md "${ARTIFACT_DIR}/"
          RECOVERY=$(find ats-mini-recovery/build -name "*.ino.bin" \
            ! -name "*.bootloader.bin" ! -name "*.partitions.bin" | head -1)
          cp "${RECOVERY}" "${ARTIFACT_DIR}/ats-mini-${SLUG}-${SUFFIX}-recovery.bin"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-esptool-${{ runner.os }}

      - name: Merge all partitions into a single flashable binary
        run: |
          ARTIFACT=artifact/ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}

          # Install esptool from PyPI so we have a known, callable version
          # rather than trying to locate arduino-cli's internal copy at a
          # path that varies across runner environments.
          pip install esptool --quiet

          # Recovery firmware binary (compiled from ats-mini-recovery/)
          RECOVERY=$(find ats-mini-recovery/build -name "*.ino.bin" \
            ! -name "*.bootloader.bin" ! -name "*.partitions.bin" | head -1)
          echo "Recovery binary: $RECOVERY"

          SLUG="ats-mini-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}"

          # Flash layout (factory partition = recovery, always boots first):
          #   0x00000  bootloader
          #   0x08000  partition table
          #   0x0e000  OTA data — intentionally OMITTED so it stays 0xFF;
          #            the bootloader therefore always falls back to factory
          #            (recovery). Recovery forwards to ota_0 after countdown.
          #   0x10000  recovery firmware  (factory partition, 1.5 MB)
          #   0x190000 main app           (ota_0, 2.75 MB)
          #
          # Flash mode/freq: dio @ 40 MHz. REQUIRED for octal-PSRAM (PSRAM=opi)
          # boards — the OPI PSRAM occupies the GPIOs QIO flash needs, so the
          # flash can only run in 2-data-line DIO mode. A QIO header hangs the
          # ROM bootloader at "ets_loader.c 78". These bytes live in the
          # bootloader header at 0x0, so every consumer of this merged image
          # (desktop esptool, the Android USB flasher, the web flasher) inherits
          # the correct mode automatically.
          #
          # Standard merged binary — flash at 0x0 for clean installs.
          # Preserves user settings / LittleFS on re-flash (fills only regions listed).
          python3 -m esptool \
            --chip esp32s3 merge_bin \
            --output "$ARTIFACT/${SLUG}-flash.bin" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 8MB \
            0x0       "$ARTIFACT"/*.ino.bootloader.bin \
            0x8000    "$ARTIFACT"/*.ino.partitions.bin \
            0x10000   "$RECOVERY" \
            0x190000  "$ARTIFACT"/*.ino.bin

          # Full 8 MB image — every byte overwritten (use for bricked devices).
          python3 -m esptool \
            --chip esp32s3 merge_bin \
            --output "$ARTIFACT/${SLUG}-full.bin" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 8MB \
            --fill-flash-size 8MB \
            0x0       "$ARTIFACT"/*.ino.bootloader.bin \
            0x8000    "$ARTIFACT"/*.ino.partitions.bin \
            0x10000   "$RECOVERY" \
            0x190000  "$ARTIFACT"/*.ino.bin

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ github.event.repository.name }}-${{ steps.slug.outputs.slug }}-${{ matrix.board.artifact-suffix }}
          path: artifact

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
    steps:
      - name: Download the build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ats-mini-*'
          merge-multiple: true
          path: artifact
      - name: Collect release binaries
        run: |
          find artifact -name '*-ospi-flash.bin' -exec cp {} . \;
          find artifact -name '*-ospi-full.bin'  -exec cp {} . \;
          find artifact -name '*.ino.bin' ! -name '*.bootloader.bin' ! -name '*.partitions.bin' \
            -exec cp {} "ats-mini-${{ needs.build.outputs.slug }}-ospi-ota.bin" \;
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLUG: ${{ needs.build.outputs.slug }}
        run: >-
          python -c 'import os,re; t=open(f"""artifact/ats-mini-{os.environ["SLUG"]}-ospi/CHANGELOG.md""").read(); r=re.search(f"""(^## {os.environ["SLUG"][1:].replace(".", "\\.") } .*?)(?=^## \\d|\\Z)""", t, re.MULTILINE | re.DOTALL); print(r.group(0) if r else "")' |
          gh release create "$SLUG" --repo '${{ github.repository }}' --notes-file -
      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLUG: ${{ needs.build.outputs.slug }}
        run: |
          gh release upload "$SLUG" ./*-ospi-flash.bin ./*-ospi-full.bin ./*-ospi-ota.bin --repo '${{ github.repository }}' --clobber

  firmware-auto-release:
    # Auto-bumps VER_APP and publishes a versioned firmware release on every
    # push to main. Mirrors how ios.yml auto-releases ios-vX.Y.Z on each push.
    # Serialized so back-to-back pushes don't race on tag creation.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: firmware-release
      cancel-in-progress: false
    env:
      VERSION: ${{ needs.build.outputs.fw_version }}
      TAG: ${{ needs.build.outputs.fw_tag }}
      NEW_RAW: ${{ needs.build.outputs.fw_raw }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply VER_APP bump
        run: |
          # Re-apply the same bump the build job did (idempotent: same formula)
          RAW=$(grep -oP '#define VER_APP\s+\K\d+' ats-mini/Common.h)
          if [ "$RAW" = "$NEW_RAW" ]; then
            echo "VER_APP already at ${NEW_RAW} on disk — nothing to write."
          else
            sed -i "s/#define VER_APP        ${RAW}/#define VER_APP        ${NEW_RAW}/" ats-mini/Common.h
            echo "Wrote VER_APP=${NEW_RAW} to Common.h"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ats-mini-*'
          merge-multiple: true
          path: artifact

      - name: Collect release binaries with clean version names
        run: |
          mkdir -p release
          # Merged binary (flash at 0x0, preserves LittleFS / user settings)
          find artifact -name '*-ospi-flash.bin' -exec \
            cp {} "release/ats-mini-${TAG}-ospi-flash.bin" \;
          # Full 8 MB image — every byte overwritten (use for bricked devices)
          find artifact -name '*-ospi-full.bin' -exec \
            cp {} "release/ats-mini-${TAG}-ospi-full.bin" \;
          # Raw app binary for web OTA upload
          find artifact -name '*.ino.bin' ! -name '*.bootloader.bin' ! -name '*.partitions.bin' \
            ! -name '*-recovery.bin' -exec \
            cp {} "release/ats-mini-${TAG}-ospi-ota.bin" \;
          # Recovery binary: flash to factory partition (0x10000) for emergency restore
          find artifact -name '*-ospi-recovery.bin' -exec \
            cp {} "release/ats-mini-${TAG}-ospi-recovery.bin" \;

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${GITHUB_REPOSITORY}"

          # Look up latest iOS release
          IOS_RELEASE=$(gh api "repos/${REPO}/releases?per_page=20" \
            --jq '[.[] | select(.tag_name | startswith("ios-v"))] | first' 2>/dev/null || echo "null")
          IOS_TAG=$(echo "$IOS_RELEASE" | jq -r '.tag_name // empty' 2>/dev/null || true)
          IOS_URL=$(echo "$IOS_RELEASE" | jq -r \
            '.assets[]? | select(.name == "ATSMini.ipa") | .browser_download_url' 2>/dev/null || true)

          # Look up latest Android release
          ANDROID_RELEASE=$(gh api "repos/${REPO}/releases?per_page=20" \
            --jq '[.[] | select(.tag_name | startswith("android-v"))] | first' 2>/dev/null || echo "null")
          ANDROID_TAG=$(echo "$ANDROID_RELEASE" | jq -r '.tag_name // empty' 2>/dev/null || true)
          ANDROID_URL=$(echo "$ANDROID_RELEASE" | jq -r \
            '.assets[]? | select(.name | endswith(".apk")) | .browser_download_url' 2>/dev/null || true)

          # Build link cells (fall back to em-dash when not found)
          if [ -n "$IOS_URL" ]; then
            export IOS_CELL="[ATSMini.ipa \`${IOS_TAG}\`](${IOS_URL})"
          else
            export IOS_CELL="— _(not yet built)_"
          fi
          if [ -n "$ANDROID_URL" ]; then
            APKNAME=$(basename "$ANDROID_URL")
            export ANDROID_CELL="[\`${APKNAME}\` \`${ANDROID_TAG}\`](${ANDROID_URL})"
          else
            export ANDROID_CELL="— _(not yet built)_"
          fi

          python3 - << 'PYEOF' > fw-release-notes.md
          import os, re
          tag     = os.environ['TAG']
          version = os.environ['VERSION']
          repo    = os.environ['GITHUB_REPOSITORY']
          ios     = os.environ['IOS_CELL']
          android = os.environ['ANDROID_CELL']
          base = f"https://github.com/{repo}/releases/download/{tag}"
          changelog = ""
          try:
              t = open('CHANGELOG.md').read()
              m = re.search(r'(^## ' + re.escape(version) + r' .*?)(?=^## |\Z)', t, re.MULTILINE | re.DOTALL)
              if m:
                  changelog = m.group(0).strip()
          except Exception:
              pass
          out = [
              "## Downloads\n",
              "| Asset | Description |",
              "|---|---|",
              f"| [ats-mini-{tag}-ospi-ota.bin]({base}/ats-mini-{tag}-ospi-ota.bin) | Web OTA — upload via browser |",
              f"| [ats-mini-{tag}-ospi-flash.bin]({base}/ats-mini-{tag}-ospi-flash.bin) | esptool install (preserves settings) |",
              f"| [ats-mini-{tag}-ospi-full.bin]({base}/ats-mini-{tag}-ospi-full.bin) | Complete 8 MB image (erases everything) |",
              f"| [ats-mini-{tag}-ospi-recovery.bin]({base}/ats-mini-{tag}-ospi-recovery.bin) | Recovery — flash to 0x10000 in bootloader mode |",
              f"| {ios} | iOS companion app |",
              f"| {android} | Android companion app |",
              "",
              "<details>",
              "<summary>esptool flash commands</summary>",
              "",
              "```bash",
              "# Standard install (preserves LittleFS / settings):",
              f"esptool.py --chip esp32s3 write_flash --flash_mode dio --flash_freq 40m 0x0 ats-mini-{tag}-ospi-flash.bin",
              "",
              "# Emergency recovery (bootloader mode only):",
              f"esptool.py --chip esp32s3 write_flash --flash_mode dio --flash_freq 40m 0x10000 ats-mini-{tag}-ospi-recovery.bin",
              "```",
              "</details>",
          ]
          if changelog:
              out += ["", changelog]
          else:
              out += [f"\n_Firmware release {tag} — auto-built._"]
          print('\n'.join(out))
          PYEOF

      - name: Commit version bump, tag, and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ats-mini/Common.h
          if git diff --cached --quiet; then
            echo "No Common.h change to commit (already on ${NEW_RAW})"
          else
            git commit -m "chore: bump firmware to ${TAG} [skip ci]"
            git fetch origin main
            git rebase --autostash origin/main
            git push origin main
          fi

          # Tag from whatever HEAD looks like now (which has the bumped Common.h)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — skipping retag"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --make-latest=true \
            --notes-file fw-release-notes.md \
            release/*-ospi-ota.bin \
            release/*-ospi-flash.bin \
            release/*-ospi-full.bin \
            release/*-ospi-recovery.bin
